
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --saffron: #E8650A;
    --saffron-light: #FDF0E6;
    --saffron-mid: #F5A55A;
    --maroon: #7B1F2E;
    --cream: #FDF8F2;
    --gold: #C49A3C;
    --text: #1A1208;
    --muted: #7A6A55;
    --border: #E8DDD0;
    --surface: #FFFFFF;
    --green: #2E7D52;
    --green-bg: #EBF5EF;
  }

  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }

  .app { display: flex; flex-direction: column; min-height: 100vh; }

  /* Header */
  .header {
    background: var(--maroon);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-brand {
    display: flex; align-items: center; gap: 10px;
  }
  .header-logo {
    width: 36px; height: 36px; background: var(--saffron); border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .header-title { font-family: 'Noto Serif', serif; color: #fff; font-size: 18px; font-weight: 600; }
  .header-sub { color: #FFCB8E; font-size: 11px; margin-top: 1px; }
  .header-nav { display: flex; gap: 4px; }
  .nav-btn {
    padding: 7px 16px; border-radius: 6px; border: none; cursor: pointer;
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    background: transparent; color: rgba(255,255,255,0.65); transition: all 0.15s;
  }
  .nav-btn.active { background: var(--saffron); color: #fff; }
  .nav-btn:not(.active):hover { background: rgba(255,255,255,0.1); color: #fff; }

  /* Tabs */
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ===== BILLING TAB ===== */
  .billing-layout {
    display: grid; grid-template-columns: 1fr 360px; gap: 20px;
    padding: 20px 24px; align-items: start;
  }

  .section-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden;
  }
  .card-head {
    padding: 14px 18px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-head h3 { font-family: 'Noto Serif', serif; font-size: 15px; font-weight: 600; }
  .card-body { padding: 18px; }

  /* Product grid */
  .product-search {
    width: 100%; padding: 9px 14px; border: 1px solid var(--border);
    border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px;
    background: var(--cream); margin-bottom: 14px; outline: none;
  }
  .product-search:focus { border-color: var(--saffron); }

  .product-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
    max-height: 320px; overflow-y: auto;
  }
  .product-tile {
    border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 8px; cursor: pointer; text-align: center;
    transition: all 0.12s; background: var(--cream);
  }
  .product-tile:hover { border-color: var(--saffron); background: var(--saffron-light); }
  .product-tile.added { border-color: var(--green); background: var(--green-bg); }
  .product-emoji { font-size: 22px; display: block; margin-bottom: 4px; }
  .product-name { font-size: 11px; font-weight: 500; color: var(--text); line-height: 1.3; }
  .product-price { font-size: 11px; color: var(--saffron); margin-top: 2px; font-weight: 500; }

  /* Bill panel */
  .customer-row {
    display: flex; gap: 8px; margin-bottom: 14px;
  }
  .customer-input {
    flex: 1; padding: 8px 12px; border: 1px solid var(--border);
    border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px;
    background: var(--cream); outline: none;
  }
  .customer-input:focus { border-color: var(--saffron); }
  .occasion-select {
    padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px;
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    background: var(--cream); outline: none; color: var(--text);
    cursor: pointer;
  }

  .bill-items { min-height: 140px; margin-bottom: 12px; }
  .bill-empty {
    display: flex; align-items: center; justify-content: center;
    height: 100px; color: var(--muted); font-size: 13px;
    border: 1px dashed var(--border); border-radius: 8px;
  }
  .bill-item {
    display: flex; align-items: center; padding: 8px 0;
    border-bottom: 1px solid var(--border); gap: 8px;
  }
  .bill-item-name { flex: 1; font-size: 13px; font-weight: 500; }
  .bill-item-qty {
    display: flex; align-items: center; gap: 6px;
  }
  .qty-btn {
    width: 22px; height: 22px; border-radius: 50%; border: 1px solid var(--border);
    background: var(--cream); cursor: pointer; font-size: 14px; font-weight: 500;
    display: flex; align-items: center; justify-content: center;
    color: var(--saffron); line-height: 1;
  }
  .qty-btn:hover { background: var(--saffron-light); }
  .qty-num { font-size: 13px; min-width: 18px; text-align: center; }
  .bill-item-total { font-size: 13px; font-weight: 500; min-width: 52px; text-align: right; }
  .bill-item-del { color: #ccc; cursor: pointer; font-size: 16px; padding: 0 2px; }
  .bill-item-del:hover { color: #e53; }

  .bill-summary {
    background: var(--cream); border-radius: 8px; padding: 12px 14px; margin-bottom: 14px;
  }
  .summary-row { display: flex; justify-content: space-between; font-size: 13px; padding: 2px 0; color: var(--muted); }
  .summary-row.total { font-size: 16px; font-weight: 600; color: var(--text); padding-top: 8px; border-top: 1px solid var(--border); margin-top: 6px; }
  .summary-row.total span:last-child { color: var(--saffron); }

  .bill-actions { display: flex; gap: 8px; }
  .btn-primary {
    flex: 1; padding: 11px; background: var(--saffron); color: #fff;
    border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 500; cursor: pointer; transition: 0.15s;
  }
  .btn-primary:hover { background: #cf5608; }
  .btn-secondary {
    padding: 11px 16px; background: var(--cream); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; transition: 0.15s;
  }
  .btn-secondary:hover { border-color: var(--saffron); color: var(--saffron); }

  /* ===== INVENTORY TAB ===== */
  .inventory-layout { padding: 20px 24px; }
  .inv-toolbar {
    display: flex; gap: 10px; align-items: center; margin-bottom: 16px;
  }
  .inv-search {
    flex: 1; padding: 9px 14px; border: 1px solid var(--border);
    border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px;
    background: var(--surface); outline: none;
  }
  .inv-search:focus { border-color: var(--saffron); }
  .btn-add-item {
    padding: 9px 18px; background: var(--saffron); color: #fff;
    border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap;
  }

  .inv-table { width: 100%; border-collapse: collapse; }
  .inv-table th {
    text-align: left; padding: 10px 14px; font-size: 11px; font-weight: 500;
    color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em;
    border-bottom: 1px solid var(--border); background: var(--cream);
  }
  .inv-table td { padding: 11px 14px; font-size: 13px; border-bottom: 1px solid var(--border); }
  .inv-table tr:last-child td { border-bottom: none; }
  .inv-table tr:hover td { background: var(--saffron-light); }
  .stock-badge {
    display: inline-block; padding: 3px 9px; border-radius: 20px;
    font-size: 11px; font-weight: 500;
  }
  .stock-ok { background: var(--green-bg); color: var(--green); }
  .stock-low { background: #FFF3E0; color: #E65100; }
  .stock-out { background: #FFEBEE; color: #C62828; }

  /* ===== CUSTOMERS TAB ===== */
  .customers-layout { padding: 20px 24px; }
  .cust-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
  .cust-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px 18px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .cust-header { display: flex; align-items: center; gap: 12px; }
  .cust-avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--saffron); display: flex; align-items: center;
    justify-content: center; font-family: 'Noto Serif', serif;
    font-size: 16px; color: #fff; font-weight: 600; flex-shrink: 0;
  }
  .cust-name { font-weight: 500; font-size: 14px; }
  .cust-phone { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .cust-stats { display: flex; gap: 8px; }
  .cust-stat {
    flex: 1; background: var(--cream); border-radius: 8px;
    padding: 8px 10px; text-align: center;
  }
  .cust-stat-val { font-size: 15px; font-weight: 600; color: var(--saffron); }
  .cust-stat-label { font-size: 10px; color: var(--muted); margin-top: 1px; }
  .cust-occasion {
    font-size: 11px; color: var(--muted);
    display: flex; align-items: center; gap: 5px;
  }
  .occasion-tag {
    display: inline-block; padding: 2px 8px; border-radius: 20px;
    background: var(--saffron-light); color: var(--saffron);
    font-size: 11px; font-weight: 500;
  }

  /* ===== DASHBOARD STATS ===== */
  .stats-bar {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
    padding: 16px 24px 0;
  }
  .stat-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px;
  }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .stat-val { font-size: 22px; font-weight: 600; margin-top: 4px; font-family: 'Noto Serif', serif; }
  .stat-val.orange { color: var(--saffron); }
  .stat-val.green { color: var(--green); }
  .stat-val.maroon { color: var(--maroon); }
  .stat-val.gold { color: var(--gold); }

  /* Receipt modal */
  .receipt-overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(26,18,8,0.55); display: none;
    align-items: center; justify-content: center; z-index: 100;
  }
  .receipt-overlay.show { display: flex; }
  .receipt {
    background: #fff; border-radius: 12px; width: 300px;
    padding: 24px 22px; font-family: 'DM Sans', sans-serif;
    max-height: 90vh; overflow-y: auto;
  }
  .receipt-logo { text-align: center; margin-bottom: 12px; }
  .receipt-logo div { font-family: 'Noto Serif', serif; font-size: 18px; font-weight: 600; color: var(--maroon); }
  .receipt-logo small { font-size: 11px; color: var(--muted); }
  .receipt-divider { border: none; border-top: 1px dashed var(--border); margin: 10px 0; }
  .receipt-row { display: flex; justify-content: space-between; font-size: 13px; padding: 3px 0; }
  .receipt-total { display: flex; justify-content: space-between; font-size: 16px; font-weight: 600; padding: 8px 0 0; border-top: 1px solid var(--border); margin-top: 4px; }
  .receipt-footer { text-align: center; font-size: 11px; color: var(--muted); margin-top: 14px; }
  .receipt-close { width: 100%; margin-top: 14px; padding: 10px; background: var(--maroon); color: #fff; border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; }

  .app-wrapper { position: relative; }
</style>

<div class="app-wrapper">
<div class="app">

  <div class="header">
    <div class="header-brand">
      <div class="header-logo">🪔</div>
      <div>
        <div class="header-title">Shalini Pooja Store</div>

                <option value="">Occasion</option>
                <option>Satyanarayan Puja</option>

  <!-- INVENTORY TAB -->
  <div id="tab-inventory" class="tab-content">

<script>
const PRODUCTS = [
  { id:1, name:"Agarbatti", emoji:"🪄", price:30, cat:"Incense", stock:45, unit:"pack" },
  { id:2, name:"Camphor", emoji:"🕯️", price:25, cat:"Flame", stock:60, unit:"box" },
  { id:3, name:"Kumkum", emoji:"🔴", price:20, cat:"Powder", stock:8, unit:"pack" },
  { id:4, name:"Haldi", emoji:"🟡", price:15, cat:"Powder", stock:12, unit:"pack" },
  { id:5, name:"Coconut", emoji:"🥥", price:25, cat:"Offerings", stock:30, unit:"pc" },
  { id:6, name:"Flowers", emoji:"🌸", price:40, cat:"Offerings", stock:20, unit:"bunch" },
  { id:7, name:"Deepam Oil", emoji:"💧", price:55, cat:"Oil", stock:3, unit:"bottle" },
  { id:8, name:"Puja Plate", emoji:"🍽️", price:80, cat:"Utensils", stock:0, unit:"pc" },
  { id:9, name:"Matchbox", emoji:"🔥", price:10, cat:"Flame", stock:90, unit:"box" },
  { id:10, name:"Sandalwood", emoji:"🌿", price:60, cat:"Incense", stock:5, unit:"stick" },
  { id:11, name:"Brass Diya", emoji:"🪔", price:120, cat:"Utensils", stock:15, unit:"pc" },
  { id:12, name:"Holy Water", emoji:"🫙", price:35, cat:"Offerings", stock:0, unit:"bottle" },
  { id:13, name:"Neem Leaves", emoji:"🍃", price:20, cat:"Offerings", stock:10, unit:"bunch" },
  { id:14, name:"Vibhuti", emoji:"⚪", price:25, cat:"Powder", stock:22, unit:"pack" },
  { id:15, name:"Banana Leaf", emoji:"🍌", price:15, cat:"Offerings", stock:2, unit:"pc" },
];

const CUSTOMERS = [
  { name:"Ramesh Reddy", phone:"98490 12345", visits:8, spent:1240, occasion:"Lakshmi Puja" },
  { name:"Sunita Devi", phone:"94400 67890", visits:4, spent:560, occasion:"Daily Puja" },
  { name:"Prakash Rao", phone:"99890 11223", visits:12, spent:2100, occasion:"Satyanarayan Puja" },
  { name:"Annapurna", phone:"97050 44556", visits:3, spent:340, occasion:"Griha Pravesh" },
  { name:"Venkat Sharma", phone:"93908 77889", visits:6, spent:890, occasion:"Navaratri" },
  { name:"Lakshmi Bai", phone:"91500 33214", visits:9, spent:1580, occasion:"Ganesh Puja" },
];

let cart = [];
let salesTotal = 0;
let billCount = 0;

function initProducts(filter="") {
  const grid = document.getElementById('product-grid');
  const filtered = PRODUCTS.filter(p => p.name.toLowerCase().includes(filter.toLowerCase()));
  grid.innerHTML = filtered.map(p => {
    const inCart = cart.find(c => c.id === p.id);
    return `<div class="product-tile ${inCart ? 'added' : ''} ${p.stock === 0 ? 'style="opacity:0.4;pointer-events:none"' : ''}" onclick="addToCart(${p.id})">
      <span class="product-emoji">${p.emoji}</span>
      <div class="product-name">${p.name}</div>
      <div class="product-price">₹${p.price}/${p.unit}</div>
    </div>`;
  }).join('');
}

function filterProducts(val) { initProducts(val); }

function addToCart(id) {
  const prod = PRODUCTS.find(p => p.id === id);
  if (!prod || prod.stock === 0) return;
  const existing = cart.find(c => c.id === id);
  if (existing) existing.qty++;
  else cart.push({ ...prod, qty: 1 });
  renderBill();
  initProducts(document.querySelector('.product-search').value);
}

function changeQty(id, delta) {
  const item = cart.find(c => c.id === id);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) cart = cart.filter(c => c.id !== id);
  renderBill();
  initProducts(document.querySelector('.product-search').value);
}

function renderBill() {
  const container = document.getElementById('bill-items');
  const sub = cart.reduce((s, c) => s + c.price * c.qty, 0);
  document.getElementById('bill-count').textContent = cart.length + ' item' + (cart.length !== 1 ? 's' : '');
  if (cart.length === 0) {
    container.innerHTML = '<div class="bill-empty">Add items from the left →</div>';
  } else {
    container.innerHTML = cart.map(c => `
      <div class="bill-item">
        <span class="product-emoji" style="font-size:18px">${c.emoji}</span>
        <span class="bill-item-name">${c.name}</span>
        <div class="bill-item-qty">
          <button class="qty-btn" onclick="changeQty(${c.id},-1)">−</button>
          <span class="qty-num">${c.qty}</span>
          <button class="qty-btn" onclick="changeQty(${c.id},1)">+</button>
        </div>
        <span class="bill-item-total">₹${c.price * c.qty}</span>
        <span class="bill-item-del" onclick="changeQty(${c.id},-99)">×</span>
      </div>`).join('');
  }
  document.getElementById('s-sub').textContent = '₹' + sub.toFixed(2);
  document.getElementById('s-total').textContent = '₹' + sub.toFixed(2);
}

function clearBill() {
  cart = [];
  document.getElementById('cust-name').value = '';
  document.getElementById('cust-occasion').value = '';
  renderBill();
  initProducts();
}

function printBill() {
  if (cart.length === 0) { alert('Add items to the bill first!'); return; }
  const name = document.getElementById('cust-name').value || 'Walk-in Customer';
  const occasion = document.getElementById('cust-occasion').value;
  const total = cart.reduce((s, c) => s + c.price * c.qty, 0);
  const now = new Date();
  const timeStr = now.toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'});
  const dateStr = now.toLocaleDateString('en-IN');
  billCount++;
  salesTotal += total;
  document.getElementById('stat-sales').textContent = '₹' + salesTotal.toLocaleString('en-IN');
  document.getElementById('stat-bills').textContent = billCount;

  const rows = cart.map(c => `
    <div class="receipt-row"><span>${c.emoji} ${c.name} × ${c.qty}</span><span>₹${c.price * c.qty}</span></div>`).join('');

  document.getElementById('receipt-content').innerHTML = `
    <div class="receipt-logo">
      <div>🪔 Shalini Pooja Store</div>
      <small>Beside Ashta Laxmi Temple, Kothapet, Hyderabad • 94490 XXXXX</small>
    </div>
    <hr class="receipt-divider">
    <div class="receipt-row"><span><b>${name}</b></span><span style="color:var(--muted)">${occasion || ''}</span></div>
    <div class="receipt-row" style="color:var(--muted);font-size:12px"><span>Bill #${billCount}</span><span>${dateStr}, ${timeStr}</span></div>
    <hr class="receipt-divider">
    ${rows}
    <div class="receipt-total"><span>Total</span><span style="color:var(--saffron)">₹${total.toFixed(2)}</span></div>
    <div class="receipt-footer">🙏 Thank you! Come again<br>Jay Shri Ram</div>
    <button class="receipt-close" onclick="closeReceipt()">Done</button>
  `;
  document.getElementById('receipt-overlay').classList.add('show');
  clearBill();
}

function closeReceipt() {
  document.getElementById('receipt-overlay').classList.remove('show');
}

function initInventory(filter="") {
  const body = document.getElementById('inv-body');
  const filtered = PRODUCTS.filter(p => p.name.toLowerCase().includes(filter.toLowerCase()));
  let lowCount = 0;
  body.innerHTML = filtered.map(p => {
    let badge, status;
    if (p.stock === 0) { badge = 'stock-out'; status = 'Out of Stock'; lowCount++; }
    else if (p.stock <= 5) { badge = 'stock-low'; status = 'Low Stock'; lowCount++; }
    else { badge = 'stock-ok'; status = 'In Stock'; }
    return `<tr>
      <td><span style="margin-right:6px">${p.emoji}</span>${p.name}</td>
      <td style="color:var(--muted)">${p.cat}</td>
      <td>₹${p.price}/${p.unit}</td>
      <td>${p.stock} ${p.unit}s</td>
      <td><span class="stock-badge ${badge}">${status}</span></td>
    </tr>`;
  }).join('');
  document.getElementById('stat-low').textContent = lowCount;
}

function filterInventory(val) { initInventory(val); }

function initCustomers() {
  const grid = document.getElementById('cust-grid');
  grid.innerHTML = CUSTOMERS.map(c => {
    const initials = c.name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
    return `<div class="cust-card">
      <div class="cust-header">
        <div class="cust-avatar">${initials}</div>
        <div>
          <div class="cust-name">${c.name}</div>
          <div class="cust-phone">${c.phone}</div>
        </div>
      </div>
      <div class="cust-stats">
        <div class="cust-stat">
          <div class="cust-stat-val">${c.visits}</div>
          <div class="cust-stat-label">Visits</div>
        </div>
        <div class="cust-stat">
          <div class="cust-stat-val">₹${c.spent}</div>
          <div class="cust-stat-label">Total Spent</div>
        </div>
      </div>
      <div class="cust-occasion">
        Usual occasion: <span class="occasion-tag">${c.occasion}</span>
      </div>
    </div>`;
  }).join('');
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  btn.classList.add('active');
}

initProducts();
initInventory();
initCustomers();
</script>
